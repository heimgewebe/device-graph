version: 1
phase: structure-only
enforcement_level: strict

rules:
  - id: rule-01-structure-only
    description: "No substantive content in docs/blueprints, docs/plans, docs/reference, or data during structure-only phase."
  - id: rule-02-no-redundant-assignments
    description: "Role assignments belong only in data/assignments."
  - id: rule-03-generated-files
    description: "Files under docs/_generated must never be edited manually."
  - id: rule-04-schema-discipline
    description: "Schema and validation scaffolding must remain coherent."

safe_read_paths:
  - README.md
  - AGENTS.md
  - docs/**
  - schemas/**
  - scripts/**
  - Makefile

guarded_write_paths:
  - docs/**
  - data/**
  - schemas/**
  - scripts/**
  - Makefile
  - repo.meta.yaml
  - agent-policy.yaml

forbidden_write_paths:
  - docs/_generated/**

required_checks:
  - make validate
