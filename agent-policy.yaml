version: 2
phase: active-modeling
enforcement_level: strict

rules:
  - id: rule-01-model-repo-boundary
    description: "This repository models devices, networks, roles, relations, trust zones, and migration states. It must not become a host-specific configuration repo."
  - id: rule-02-no-redundant-role-mapping
    description: "Role-to-device mapping belongs only in data/assignments/. No HAS_ROLE-style relations in data/relations/."
  - id: rule-03-schema-compliance
    description: "All structured data under data/ must validate against schemas/."
  - id: rule-04-epistemic-explicitness
    description: "Uncertain or future states must be explicitly marked using fields such as status, confidence, visibility, and future epistemic markers."
  - id: rule-05-generated-files
    description: "Files under docs/_generated/ are generated-only and must never be edited manually."
  - id: rule-06-reference-discipline
    description: "Relation and state semantics must remain aligned with docs/reference/ and the active schemas."
  - id: rule-07-no-silent-assumptions
    description: "Do not introduce implicit defaults, unstated ontology assumptions, or hidden semantic meaning."

safe_read_paths:
  - README.md
  - AGENTS.md
  - repo.meta.yaml
  - docs/**
  - data/**
  - schemas/**
  - scripts/**
  - Makefile

guarded_write_paths:
  - docs/**
  - data/**
  - schemas/**
  - scripts/**
  - Makefile
  - repo.meta.yaml
  - agent-policy.yaml

forbidden_write_paths:
  - docs/_generated/**

required_checks:
  - make validate

preferred_workflow:
  - "Read README.md, AGENTS.md, docs/index.md, and relevant docs/reference/ files first."
  - "For changes to data/ or schemas/, run make validate before proposing completion."
  - "Fix sources, not generated outputs."
